<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>繽紛旋律大挑戰 - 限時衝刺模式</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.95);
            --stepwise-color: #4facfe;
            --skipwise-color: #f093fb;
            --accent-color: #ffed4b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Microsoft JhengHei', cursive, sans-serif;
        }

        body {
            /* 更加繽紛的馬卡龍漸層背景 */
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            min-height: 100vh;
            color: #444;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            border: 8px solid #fff;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            color: white;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-box {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            flex: 1;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-bottom: 4px solid #ddd;
        }

        .label { font-size: 0.9rem; color: #888; font-weight: bold; margin-bottom: 5px; }
        .value { font-size: 1.8rem; font-weight: 900; color: #333; }

        /* 時間警告顏色 */
        .timer-low { color: #ff5e62 !important; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .melody-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 40px 20px;
            background: #f8f9fa;
            border-radius: 30px;
            margin-bottom: 25px;
            min-height: 160px;
            border: 3px dashed #ddd;
        }

        .note-card {
            width: 85px;
            height: 85px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
            transition: 0.2s;
            position: relative;
        }

        .note-letter { font-size: 2.2rem; }
        .note-name { font-size: 0.8rem; opacity: 0.9; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 20px;
            border: none;
            border-radius: 25px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-stepwise { background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); box-shadow: 0 6px 0 #3a8dca; }
        .btn-skipwise { background: linear-gradient(to bottom, #f093fb 0%, #f5576c 100%); box-shadow: 0 6px 0 #c276ca; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #888; }
        .btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        /* 結算畫面 */
        #gameOverModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
        }

        .modal-content {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 40px;
            max-width: 400px;
            width: 90%;
        }

        .restart-btn {
            margin-top: 20px;
            padding: 15px 40px;
            background: #ffed4b;
            color: #333;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .feedback {
            height: 60px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 15px;
        }

        .correct { color: #4cd137; }
        .incorrect { color: #e84118; }

    </style>
</head>
<body>

    <div class="game-container">
        <header>
            <h1>🎶 旋律大挑戰</h1>
            <p>1 分鐘限時衝刺！你能拿幾分？</p>
        </header>

        <div class="game-info">
            <div class="info-box">
                <div class="label">剩餘時間</div>
                <div class="value" id="timer">60s</div>
            </div>
            <div class="info-box">
                <div class="label">目前分數</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="info-box">
                <div class="label">最高連勝</div>
                <div class="value" id="streak">0</div>
            </div>
        </div>

        <div class="melody-display" id="melodyArea">
            </div>

        <div class="feedback" id="feedback">準備好了嗎？</div>

        <div class="controls">
            <button class="btn btn-stepwise" onclick="checkAnswer('stepwise')" id="btnStep">
                <i class="fas fa-stairs"></i> 級進
            </button>
            <button class="btn btn-skipwise" onclick="checkAnswer('skipwise')" id="btnSkip">
                <i class="fas fa-rabbit-hop"></i> 跳進
            </button>
        </div>
    </div>

    <div id="gameOverModal">
        <div class="modal-content">
            <h2 style="font-size: 2.5rem; margin-bottom: 20px;">⏰ 時間到！</h2>
            <p style="font-size: 1.2rem;">你的最終得分</p>
            <div style="font-size: 4rem; font-weight: 900; color: #764ba2;" id="finalScore">0</div>
            <p id="finalStats"></p>
            <button class="restart-btn" onclick="resetGame()">再次挑戰 <i class="fas fa-redo"></i></button>
        </div>
    </div>

    <script>
        const melodies = [
            { notes: ['C', 'D', 'E', 'F'], type: 'stepwise' },
            { notes: ['G', 'E', 'C', 'G'], type: 'skipwise' },
            { notes: ['E', 'F', 'G', 'A'], type: 'stepwise' },
            { notes: ['A', 'F', 'D', 'B'], type: 'skipwise' },
            { notes: ['B', 'A', 'G', 'F'], type: 'stepwise' },
            { notes: ['C', 'E', 'G', 'B'], type: 'skipwise' },
            { notes: ['D', 'E', 'D', 'C'], type: 'stepwise' },
            { notes: ['F', 'A', 'C', 'F'], type: 'skipwise' }
        ];

        const colors = {
            'C': '#FF6B6B', 'D': '#FF9E2C', 'E': '#FFD93D', 
            'F': '#6BCB77', 'G': '#4D96FF', 'A': '#9B59B6', 'B': '#F06292'
        };

        const noteNames = { 'C':'Do', 'D':'Re', 'E':'Mi', 'F':'Fa', 'G':'Sol', 'A':'La', 'B':'Si' };

        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let timeLeft = 60;
        let timerId = null;
        let currentMelody = null;
        let gameActive = false;

        function startGame() {
            score = 0;
            streak = 0;
            maxStreak = 0;
            timeLeft = 60;
            gameActive = true;
            
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('gameOverModal').style.display = 'none';
            
            nextQuestion();
            startTimer();
        }

        function startTimer() {
            if(timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                const timerEl = document.getElementById('timer');
                timerEl.textContent = timeLeft + 's';
                
                if(timeLeft <= 10) timerEl.classList.add('timer-low');
                else timerEl.classList.remove('timer-low');

                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function nextQuestion() {
            currentMelody = melodies[Math.floor(Math.random() * melodies.length)];
            const area = document.getElementById('melodyArea');
            area.innerHTML = '';

            currentMelody.notes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.style.backgroundColor = colors[note];
                card.innerHTML = `
                    <div class="note-letter">${note}</div>
                    <div class="note-name">${noteNames[note]}</div>
                `;
                area.appendChild(card);
            });
        }

        function checkAnswer(choice) {
            if(!gameActive) return;

            const feedback = document.getElementById('feedback');
            if (choice === currentMelody.type) {
                score += (10 + streak * 2);
                streak++;
                if(streak > maxStreak) maxStreak = streak;
                feedback.textContent = "✨ 太棒了！連勝中：" + streak;
                feedback.className = "feedback correct";
            } else {
                streak = 0;
                feedback.textContent = "😅 沒關係，再試一次！";
                feedback.className = "feedback incorrect";
            }

            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = maxStreak;
            nextQuestion();
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerId);
            document.getElementById('gameOverModal').style.display = 'flex';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalStats').textContent = `最高連勝紀錄：${maxStreak}`;
        }

        function resetGame() {
            startGame();
        }

        // 初始化
        window.onload = startGame;
    </script>
</body>
</html>
